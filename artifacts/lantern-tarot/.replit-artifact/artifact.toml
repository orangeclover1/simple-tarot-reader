kind = "web"
previewPath = "/"
title = "Lantern Tarot"
version = "1.0.0"
id = "artifacts/lantern-tarot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18243

[services.development]
run = "pnpm --filter @workspace/lantern-tarot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lantern-tarot", "run", "build" ]
publicDir = "artifacts/lantern-tarot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18243"
BASE_PATH = "/"
