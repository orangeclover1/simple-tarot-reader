name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Production API base URL (e.g. https://your-app.replit.app)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "artifacts/lantern-tarot/**"
      - "lib/**"
      - ".github/workflows/android-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web app
        working-directory: artifacts/lantern-tarot
        env:
          PORT: "3000"
          BASE_PATH: "/"
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL }}
        run: pnpm run build

      - name: Sync Capacitor
        working-directory: artifacts/lantern-tarot
        run: pnpm exec cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/lantern-tarot/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/lantern-tarot/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lantern-tarot-${{ github.run_number }}
          path: artifacts/lantern-tarot/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
