name: Build signed Google Play AAB

on:
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out project
        uses: actions/checkout@v5

      - name: Verify signing secrets exist
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-venv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython==0.29.37" buildozer

      - name: Restore Android build cache
        uses: actions/cache@v5
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-release-${{ hashFiles('buildozer.spec', 'requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-release-
            ${{ runner.os }}-buildozer-

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/lantern-upload.jks"
          chmod 600 "$RUNNER_TEMP/signing/lantern-upload.jks"

      - name: Build signed release AAB
        env:
          P4A_RELEASE_KEYSTORE: ${{ runner.temp }}/signing/lantern-upload.jks
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./scripts/build_release.sh

      - name: Upload signed AAB
        uses: actions/upload-artifact@v5
        with:
          name: lantern-tarot-signed-aab
          path: bin/*.aab
          if-no-files-found: error
